version: '3.8'

services:
  openspace:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - COPILOT_CLI_URL=${COPILOT_CLI_URL:-}
      - COPILOT_MODEL=${COPILOT_MODEL:-claude-opus-4.6}
      - GITHUB_API_TOKEN=${GITHUB_API_TOKEN:-}
    volumes:
      # Mount your project's .squad directory
      - ${SQUAD_PROJECT_DIR:-.}/.squad:/workspace/.squad
    restart: unless-stopped
