<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOOM! 💥</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0a0a0a;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        cursor: pointer;
        font-family: 'Arial Black', sans-serif;
      }

      .hint {
        position: fixed;
        bottom: 30px;
        color: rgba(255, 255, 255, 0.4);
        font-size: 14px;
        letter-spacing: 2px;
        text-transform: uppercase;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }

      canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      .boom-text {
        position: fixed;
        font-size: 0;
        font-weight: 900;
        color: #fff;
        text-shadow:
          0 0 20px #ff4500,
          0 0 40px #ff6347,
          0 0 80px #ff4500,
          0 0 120px #ff0000;
        pointer-events: none;
        z-index: 10;
        opacity: 0;
        letter-spacing: 10px;
      }

      .boom-text.active {
        animation:
          boomIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards,
          boomOut 0.4s ease-in 0.8s forwards;
      }

      @keyframes boomIn {
        0% {
          font-size: 0;
          opacity: 0;
          transform: scale(0.1) rotate(-10deg);
        }
        50% {
          opacity: 1;
        }
        100% {
          font-size: clamp(60px, 15vw, 200px);
          opacity: 1;
          transform: scale(1) rotate(0deg);
        }
      }

      @keyframes boomOut {
        to {
          opacity: 0;
          transform: scale(2);
          filter: blur(10px);
        }
      }

      .flash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        pointer-events: none;
        opacity: 0;
        z-index: 5;
      }

      .flash.active {
        animation: flashBang 0.3s ease-out forwards;
      }

      @keyframes flashBang {
        0% {
          opacity: 0.9;
        }
        100% {
          opacity: 0;
        }
      }

      .shockwave {
        position: fixed;
        border-radius: 50%;
        border: 4px solid rgba(255, 69, 0, 0.6);
        pointer-events: none;
        z-index: 4;
      }

      .shockwave.active {
        animation: shockExpand 0.8s ease-out forwards;
      }

      @keyframes shockExpand {
        0% {
          width: 0;
          height: 0;
          opacity: 1;
        }
        100% {
          width: 150vmax;
          height: 150vmax;
          opacity: 0;
          border-width: 1px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div class="boom-text" id="boomText">BOOM!</div>
    <div class="flash" id="flash"></div>
    <div class="hint">Click anywhere to explode 💥</div>

    <script>
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const boomText = document.getElementById('boomText');
      const flash = document.getElementById('flash');

      let W, H;
      const particles = [];
      const sparks = [];
      const debris = [];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      // Color palettes for explosions
      const palettes = [
        ['#ff4500', '#ff6347', '#ffa500', '#ffd700', '#ffff00', '#ff0000'],
        ['#00ffff', '#00bfff', '#1e90ff', '#4169e1', '#87ceeb', '#ffffff'],
        ['#ff00ff', '#ff1493', '#ff69b4', '#da70d6', '#ba55d3', '#ffffff'],
        ['#00ff00', '#32cd32', '#7cfc00', '#adff2f', '#00fa9a', '#ffffff'],
      ];

      let paletteIndex = 0;

      class Particle {
        constructor(x, y, palette) {
          this.x = x;
          this.y = y;
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 12 + 3;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed;
          this.life = 1;
          this.decay = Math.random() * 0.02 + 0.008;
          this.size = Math.random() * 6 + 2;
          this.color = palette[Math.floor(Math.random() * palette.length)];
          this.gravity = 0.08;
          this.trail = [];
        }

        update() {
          this.trail.push({ x: this.x, y: this.y, life: this.life });
          if (this.trail.length > 8) this.trail.shift();

          this.vy += this.gravity;
          this.x += this.vx;
          this.y += this.vy;
          this.vx *= 0.98;
          this.vy *= 0.98;
          this.life -= this.decay;
        }

        draw() {
          // Draw trail
          for (let i = 0; i < this.trail.length; i++) {
            const t = this.trail[i];
            const alpha = (i / this.trail.length) * this.life * 0.5;
            ctx.beginPath();
            ctx.arc(t.x, t.y, this.size * (i / this.trail.length), 0, Math.PI * 2);
            ctx.fillStyle =
              this.color +
              Math.floor(alpha * 255)
                .toString(16)
                .padStart(2, '0');
            ctx.fill();
          }

          // Draw particle
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
          ctx.fillStyle = this.color;
          ctx.globalAlpha = this.life;
          ctx.fill();
          ctx.globalAlpha = 1;

          // Glow effect
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size * this.life * 3, 0, Math.PI * 2);
          const grad = ctx.createRadialGradient(
            this.x,
            this.y,
            0,
            this.x,
            this.y,
            this.size * this.life * 3,
          );
          grad.addColorStop(0, this.color + '40');
          grad.addColorStop(1, this.color + '00');
          ctx.fillStyle = grad;
          ctx.fill();
        }
      }

      class Spark {
        constructor(x, y, palette) {
          this.x = x;
          this.y = y;
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 20 + 8;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed;
          this.life = 1;
          this.decay = Math.random() * 0.03 + 0.02;
          this.color = palette[Math.floor(Math.random() * palette.length)];
        }

        update() {
          this.vy += 0.15;
          this.x += this.vx;
          this.y += this.vy;
          this.vx *= 0.96;
          this.life -= this.decay;
        }

        draw() {
          ctx.beginPath();
          ctx.moveTo(this.x, this.y);
          ctx.lineTo(this.x - this.vx * 3, this.y - this.vy * 3);
          ctx.strokeStyle = this.color;
          ctx.globalAlpha = this.life;
          ctx.lineWidth = 2;
          ctx.stroke();
          ctx.globalAlpha = 1;
        }
      }

      class Debris {
        constructor(x, y) {
          this.x = x;
          this.y = y;
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 8 + 2;
          this.vx = Math.cos(angle) * speed;
          this.vy = Math.sin(angle) * speed - 3;
          this.life = 1;
          this.decay = Math.random() * 0.01 + 0.005;
          this.size = Math.random() * 4 + 1;
          this.rotation = Math.random() * Math.PI * 2;
          this.rotSpeed = (Math.random() - 0.5) * 0.3;
        }

        update() {
          this.vy += 0.12;
          this.x += this.vx;
          this.y += this.vy;
          this.rotation += this.rotSpeed;
          this.life -= this.decay;
        }

        draw() {
          ctx.save();
          ctx.translate(this.x, this.y);
          ctx.rotate(this.rotation);
          ctx.fillStyle = `rgba(255, 140, 0, ${this.life})`;
          ctx.fillRect(-this.size, -this.size, this.size * 2, this.size * 2);
          ctx.restore();
        }
      }

      function explode(x, y) {
        const palette = palettes[paletteIndex % palettes.length];
        paletteIndex++;

        // Particles
        for (let i = 0; i < 80; i++) {
          particles.push(new Particle(x, y, palette));
        }

        // Sparks
        for (let i = 0; i < 40; i++) {
          sparks.push(new Spark(x, y, palette));
        }

        // Debris
        for (let i = 0; i < 20; i++) {
          debris.push(new Debris(x, y));
        }

        // Flash
        flash.classList.remove('active');
        void flash.offsetWidth;
        flash.classList.add('active');

        // Boom text
        boomText.style.left = x + 'px';
        boomText.style.top = y + 'px';
        boomText.style.transform = 'translate(-50%, -50%)';
        boomText.classList.remove('active');
        void boomText.offsetWidth;
        boomText.classList.add('active');

        // Shockwave
        const wave = document.createElement('div');
        wave.className = 'shockwave';
        wave.style.left = x + 'px';
        wave.style.top = y + 'px';
        wave.style.transform = 'translate(-50%, -50%)';
        wave.classList.add('active');
        document.body.appendChild(wave);
        setTimeout(() => wave.remove(), 1000);

        // Screen shake
        document.body.style.transition = 'none';
        let shakeCount = 0;
        const shakeInterval = setInterval(() => {
          const dx = (Math.random() - 0.5) * 20;
          const dy = (Math.random() - 0.5) * 20;
          document.body.style.transform = `translate(${dx}px, ${dy}px)`;
          shakeCount++;
          if (shakeCount > 10) {
            clearInterval(shakeInterval);
            document.body.style.transform = '';
          }
        }, 30);
      }

      canvas.addEventListener('click', (e) => {
        explode(e.clientX, e.clientY);
      });

      // Auto boom on load
      setTimeout(() => {
        explode(W / 2, H / 2);
      }, 500);

      function animate() {
        ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
        ctx.fillRect(0, 0, W, H);

        for (let i = particles.length - 1; i >= 0; i--) {
          particles[i].update();
          particles[i].draw();
          if (particles[i].life <= 0) particles.splice(i, 1);
        }

        for (let i = sparks.length - 1; i >= 0; i--) {
          sparks[i].update();
          sparks[i].draw();
          if (sparks[i].life <= 0) sparks.splice(i, 1);
        }

        for (let i = debris.length - 1; i >= 0; i--) {
          debris[i].update();
          debris[i].draw();
          if (debris[i].life <= 0) debris.splice(i, 1);
        }

        requestAnimationFrame(animate);
      }

      animate();
    </script>
  </body>
</html>
